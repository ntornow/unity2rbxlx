name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

# CI convert steps have dedicated explicit smoke/boot gates (smoke-test, cold-e2e).
# Disable `convert`'s post-conversion auto-verify (slice 1.6) workflow-wide so Studio
# is launched ONCE via the explicit gate, not twice via two verdict paths (phase-1
# integration review, codex). Only gates convert's AUTO hook — the explicit
# `u2r.py smoke-test` step is unaffected.
env:
  U2R_DISABLE_AUTO_VERIFY: "1"

jobs:
  fast:
    name: fast test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          # Full history needed so the no-Any gate can reach the PR's merge
          # base. A fixed depth would block long-lived branches whose merge
          # base is older than the depth even when the PR adds no Any at all.
          fetch-depth: 0

      - name: No-Any annotation gate
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: bash converter/tools/check_no_any.sh "origin/${{ github.base_ref }}"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy lz4 pytest pytest-cov

      - name: Run fast test suite
        run: pytest tests/ -m "not slow" -v

  slow-unit-tests:
    name: slow unit + integration tests (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast
    timeout-minutes: 30
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # SimpleFPS is the only test_projects/* entry wired to a submodule.
      # Tests auto-skip unpopulated projects via
      # converter/tests/_project_paths.is_populated().
      - name: Init SimpleFPS submodule (skip LFS smudge)
        # The upstream repo's LFS quota is exhausted so binary assets cannot
        # be pulled; GIT_LFS_SKIP_SMUDGE=1 leaves LFS pointer files in place
        # and the converter detects + skips them (per converter/CLAUDE.md).
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive test_projects/SimpleFPS
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy lz4 pytest pytest-cov

      - name: Run full test suite (unit + integration, incl. @slow)
        run: pytest tests/ -v --junitxml=pytest-junit.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: converter/pytest-junit.xml
          retention-days: 14

  convert-matrix:
    name: convert ${{ matrix.project }}
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Only SimpleFPS is wired to a submodule URL. Re-expand this list as
        # additional test_projects/* entries gain .gitmodules mappings.
        project:
          - SimpleFPS
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init ${{ matrix.project }} submodule (skip LFS smudge)
        # Upstream Unity repos often hit LFS quota; skip smudging so the
        # pointer files stay in place — the converter detects and skips them.
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive "test_projects/${{ matrix.project }}"
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Convert ${{ matrix.project }}
        id: convert
        run: |
          python u2r.py convert "../test_projects/${{ matrix.project }}" \
            -o "./output/${{ matrix.project }}" \
            --scene all \
            --no-upload \
            --no-ai \
            --no-resolve \
            --skip-architecture-step

      - name: Validate generated rbxlx
        if: steps.convert.outcome == 'success'
        run: |
          # --scene all writes per-scene files (e.g. main.rbxlx, menu.rbxlx),
          # not a unified converted_place.rbxlx. Validate every rbxlx found.
          found=0
          for rbxlx in ./output/${{ matrix.project }}/*.rbxlx; do
            [ -f "$rbxlx" ] || continue
            found=1
            python u2r.py validate "$rbxlx"
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No rbxlx files produced under ./output/${{ matrix.project }}/"
            exit 1
          fi

      - name: Upload conversion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: convert-${{ matrix.project }}
          path: |
            converter/output/${{ matrix.project }}/*.rbxlx
            converter/output/${{ matrix.project }}/conversion_report.json
            converter/output/${{ matrix.project }}/conversion_context.json
            converter/output/${{ matrix.project }}/scripts/
          if-no-files-found: warn
          retention-days: 14

  eval-regression:
    name: eval regression vs baseline (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast
    timeout-minutes: 45
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # u2r.py eval auto-discovers populated projects under test_projects/
      # via _project_paths.is_populated(), so initing only SimpleFPS limits
      # the eval run to that project until more submodules are wired up.
      - name: Init SimpleFPS submodule (skip LFS smudge)
        # The upstream repo's LFS quota is exhausted so binary assets cannot
        # be pulled; GIT_LFS_SKIP_SMUDGE=1 leaves LFS pointer files in place
        # and the converter detects + skips them (per converter/CLAUDE.md).
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive test_projects/SimpleFPS
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval across all test projects
        run: |
          python u2r.py eval \
            --output ./eval_output \
            --baseline ./eval_output/eval_current.json

      - name: Diff against committed baseline (SimpleFPS subset)
        run: |
          # Baseline contains all 9 projects; in CI only SimpleFPS is
          # populated, so subset the baseline before diffing — otherwise
          # the 8 unpopulated projects register as MISSING regressions.
          jq '{commit, generated_at, projects: {SimpleFPS: .projects.SimpleFPS}}' \
            ./eval_baseline.json > ./eval_baseline_simplefps.json
          python u2r.py eval-diff \
            ./eval_baseline_simplefps.json \
            ./eval_output/eval_current.json \
            --fail-on-regression

      - name: Upload eval outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-output
          path: |
            converter/eval_output/eval_current.json
            converter/eval_output/**/conversion_report.json
            converter/eval_output/**/converted_place.rbxlx
          if-no-files-found: warn
          retention-days: 14

  smoke-test:
    name: smoke test SimpleFPS (self-hosted macOS + Studio)
    runs-on: [self-hosted, macOS, studio]
    # Self-hosted runner is registered to jiazou/unity2rbxlx only — when this
    # workflow runs on the upstream repo (ntornow/unity2rbxlx) there is no
    # matching runner and the job sits in queue for the 24h GitHub maximum
    # before being cancelled. Gate on the fork so upstream's nightly skips
    # this job cleanly instead of timing out the whole run.
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && github.repository == 'jiazou/unity2rbxlx'
    needs: fast
    timeout-minutes: 25
    env:
      # Path to the populated SimpleFPS Unity project on the self-hosted
      # runner. The smoke-test job checks out with submodules: false, so
      # test_projects/SimpleFPS is an unpopulated gitlink here; we point at
      # a locally cloned Unity project instead. Override by setting a
      # runner-level env var or repo variable if the path ever changes.
      UNITY_SIMPLEFPS_DIR: /Users/jiazou/workspace/unity-3d-simplefps
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # The self-hosted runner keeps its workspace between runs. If a prior
      # run left the tree dirty (stale untracked output/, half-checked-out
      # submodule dirs) actions/checkout's own clean can fall short. Reset +
      # hard-clean here so a corrupted workspace self-heals instead of
      # needing a manual wipe — the failure mode behind the 2026-05-15
      # nightly, where checkout left the converter/ dir missing.
      - name: Heal stale self-hosted workspace
        working-directory: ${{ github.workspace }}
        run: |
          git reset --hard HEAD
          git clean -ffdx
          test -d converter || { echo "::error::converter/ missing after checkout"; exit 1; }

      - name: Verify SimpleFPS source exists
        run: |
          if [ ! -d "$UNITY_SIMPLEFPS_DIR/Assets" ]; then
            echo "::error::SimpleFPS Unity project not found at $UNITY_SIMPLEFPS_DIR"
            exit 1
          fi

      - name: Install dependencies into shared venv
        run: |
          VENV="$HOME/.unity2rbxlx-venv"
          if [ ! -x "$VENV/bin/python" ]; then
            python3 -m venv "$VENV"
          fi
          "$VENV/bin/python" -m pip install --upgrade pip
          "$VENV/bin/python" -m pip install -e ".[dev]"

      - name: Convert SimpleFPS
        timeout-minutes: 10
        run: |
          "$HOME/.unity2rbxlx-venv/bin/python" u2r.py convert "$UNITY_SIMPLEFPS_DIR" \
            -o "./output/SimpleFPS" \
            --scene all \
            --no-upload \
            --no-ai \
            --no-resolve \
            --skip-architecture-step

      - name: Run smoke test
        # Step-level cap so a hung Roblox Studio fails this step in ~12min
        # with a clear error instead of silently consuming the whole 25min
        # job budget (the 2026-05-15 nightly hung to the job timeout here).
        timeout-minutes: 12
        run: |
          # --scene all writes per-scene rbxlx files (main.rbxlx is the
          # gameplay scene — 944 parts / 51 scripts). There is no unified
          # converted_place.rbxlx in multi-scene mode.
          # Absolute paths: Studio launched from a non-interactive shell
          # won't reliably resolve relative rbxlx paths (it silently falls
          # back to Start Page and F5 becomes a no-op).
          RBXLX="$PWD/output/SimpleFPS/main.rbxlx"
          if [ ! -f "$RBXLX" ]; then
            echo "::error::Expected rbxlx not found: $RBXLX"
            ls -la ./output/SimpleFPS/ || true
            exit 1
          fi
          echo "smoke-testing $RBXLX"
          "$HOME/.unity2rbxlx-venv/bin/python" u2r.py smoke-test "$RBXLX" \
            --output-dir "$PWD/smoke_output/SimpleFPS"

      # Phase 5.2a: assert no placeholder rbxassetid://0 URLs leaked into
      # the rbxlx. The smoke-test runs --no-upload so placeholder URLs ARE
      # expected for FBX/audio that need real uploads — we only enforce
      # strict validation in real-upload runs (the gated job below).
      # Here we run validate without --strict-asset-ids so the warning
      # is logged but doesn't fail the smoke job.
      - name: Validate smoke rbxlx (placeholder warnings)
        run: |
          RBXLX="$PWD/output/SimpleFPS/main.rbxlx"
          "$HOME/.unity2rbxlx-venv/bin/python" u2r.py validate "$RBXLX"

      # Phase 5.4: wire visual-compare into nightly CI. Reads the smoke
      # screenshot and compares against a committed baseline using SSIM,
      # failing on SSIM below 0.85. Gated on baseline existence so the
      # job degrades gracefully until a baseline gets committed.
      - name: Visual compare against baseline (SSIM 0.85)
        if: always()
        run: |
          ROBLOX_SHOT="$PWD/smoke_output/SimpleFPS/studio_screenshot.png"
          BASELINE="$PWD/eval_baseline_screenshots/SimpleFPS_main.png"
          if [ ! -f "$BASELINE" ]; then
            echo "::warning::No baseline screenshot at $BASELINE; visual-compare skipped. "
            echo "Commit one after a known-good run to activate the SSIM gate."
            exit 0
          fi
          if [ ! -f "$ROBLOX_SHOT" ]; then
            echo "::warning::Smoke screenshot not produced; visual-compare skipped."
            exit 0
          fi
          mkdir -p "$PWD/visual_compare/SimpleFPS"
          "$HOME/.unity2rbxlx-venv/bin/python" -c "
          import sys, json
          from pathlib import Path
          from comparison.visual_diff import compare_images
          out = Path('$PWD/visual_compare/SimpleFPS')
          out.mkdir(parents=True, exist_ok=True)
          result = compare_images(
              image_a_path=Path('$BASELINE'),
              image_b_path=Path('$ROBLOX_SHOT'),
              output_dir=out,
          )
          (out / 'visual_diff.json').write_text(json.dumps(result, indent=2, default=str))
          ssim = result['ssim']
          print(f'SSIM: {ssim:.4f}  (baseline: 0.85)')
          if ssim < 0.85:
              print(f'::error::Visual regression — SSIM {ssim:.4f} < 0.85')
              sys.exit(1)
          "

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-SimpleFPS
          path: |
            converter/smoke_output/SimpleFPS/smoke_test_report.json
            converter/smoke_output/SimpleFPS/studio_screenshot.png
            converter/visual_compare/SimpleFPS/
          if-no-files-found: warn
          retention-days: 14

  cold-e2e:
    name: cold (uncached, AI-on) e2e SimpleFPS generic Studio bind gate (self-hosted)
    runs-on: [self-hosted, macOS, studio]
    # REQUIRED PRE-MERGE GATE: runs on pull_request (in addition to the
    # nightly schedule/workflow_dispatch) so a fresh-shape regression that
    # only surfaces on a cold AI transpile is caught before merge, not days
    # later in the nightly. Same fork gate as smoke-test: the self-hosted
    # runner is registered to jiazou/unity2rbxlx only, so upstream PRs (no
    # matching runner) skip this cleanly instead of queueing to the 24h max.
    if: |
      (github.event_name == 'pull_request'
        || github.event_name == 'schedule'
        || github.event_name == 'workflow_dispatch')
      && github.repository == 'jiazou/unity2rbxlx'
    needs: fast
    timeout-minutes: 40
    env:
      # Path to the populated SimpleFPS Unity project on the self-hosted
      # runner (same as smoke-test — checkout uses submodules: false).
      UNITY_SIMPLEFPS_DIR: /Users/jiazou/workspace/unity-3d-simplefps
      # FLIPPED "1" in Phase 5 (Step-1b): the player-bind axis (wasd_works /
      # mouse_moves_view) is the required acceptance gate now that paradigm C
      # binds the player on the deterministic upstream _HasCharacterController
      # signal (verified C-owned on a fresh cold-Studio conversion with paradigm
      # A deleted). At "1" a false bind field is ::error:: + non-zero exit. The
      # BOOT/HEALTH axis is REQUIRED-GREEN regardless of this knob (it gates off
      # u2r.py smoke-test's exit code below).
      REQUIRE_PLAYER_BIND: "1"
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # The self-hosted runner keeps its workspace between runs. If a prior
      # run left the tree dirty (stale untracked output/, half-checked-out
      # submodule dirs) actions/checkout's own clean can fall short. Reset +
      # hard-clean here so a corrupted workspace self-heals instead of
      # needing a manual wipe — the failure mode behind the 2026-05-15
      # nightly, where checkout left the converter/ dir missing.
      - name: Heal stale self-hosted workspace
        working-directory: ${{ github.workspace }}
        run: |
          git reset --hard HEAD
          git clean -ffdx
          test -d converter || { echo "::error::converter/ missing after checkout"; exit 1; }

      - name: Verify SimpleFPS source exists
        run: |
          if [ ! -d "$UNITY_SIMPLEFPS_DIR/Assets" ]; then
            echo "::error::SimpleFPS Unity project not found at $UNITY_SIMPLEFPS_DIR"
            exit 1
          fi

      - name: Install dependencies into shared venv
        run: |
          VENV="$HOME/.unity2rbxlx-venv"
          if [ ! -x "$VENV/bin/python" ]; then
            python3 -m venv "$VENV"
          fi
          "$VENV/bin/python" -m pip install --upgrade pip
          "$VENV/bin/python" -m pip install -e ".[dev]"

      - name: Cold (uncached, AI-on) generic convert
        timeout-minutes: 35
        run: |
          # COLD = a FRESH AI transpile, NOT the lucky cached shape. This is
          # the failure this gate exists to catch: a binding that "passes"
          # only on a previously-cached AI shape and silently regresses the
          # moment the transpiler emits a valid-but-different shape.
          #
          # Two caches must BOTH be busted for the convert to be genuinely
          # cold (codex MAJOR / design §1, §E7):
          #   1. The transpile-result files under the output dir's scripts/
          #      (utils/script_cache.scripts_cache_intact reads
          #      <output>/scripts/*.luau) — busted by wiping $OUT.
          #   2. The AI RESPONSE cache at .cache/llm (config.py:137,
          #      LLM_CACHE_ENABLED=True), keyed on the C# input + prompt hash
          #      (code_transpiler.py:2332), 7-day TTL. This lives OUTSIDE the
          #      output dir, so wiping $OUT alone leaves it warm → the AI
          #      returns the SAME cached shape → NOT cold. Clearing it forces
          #      a real fresh round-trip to the model.
          # AI is left ON (no --no-ai): the nightly smoke-test runs --no-ai
          # (deterministic rule-based) and never exercises the AI transpile at
          # all, so it cannot catch a fresh-shape regression.
          OUT="./output/SimpleFPS_cold_e2e"
          rm -rf "$OUT"
          rm -rf .cache/llm
          "$HOME/.unity2rbxlx-venv/bin/python" u2r.py convert "$UNITY_SIMPLEFPS_DIR" \
            -o "$OUT" \
            --scene all \
            --scene-runtime=generic \
            --no-upload \
            --no-resolve \
            --skip-architecture-step

      - name: Boot/health gate (required) + bounded launch retry
        # Step-level cap so a hung Roblox Studio fails this step with a clear
        # error instead of silently consuming the whole job budget (mirrors
        # the smoke-test job's per-step Studio timeout).
        timeout-minutes: 14
        env:
          SMOKE_OUT: smoke_output/SimpleFPS_cold_e2e
        run: |
          # --scene all writes per-scene rbxlx files; main.rbxlx is the
          # gameplay scene (multi-scene SimpleFPS → main.rbxlx, NOT a unified
          # converted_place.rbxlx). Absolute path: Studio launched from a
          # non-interactive shell won't reliably resolve a relative rbxlx.
          RBXLX="$PWD/output/SimpleFPS_cold_e2e/main.rbxlx"
          if [ ! -f "$RBXLX" ]; then
            echo "::error::Expected rbxlx not found: $RBXLX"
            ls -la ./output/SimpleFPS_cold_e2e/ || true
            exit 1
          fi
          REPORT="$PWD/$SMOKE_OUT/smoke_test_report.json"

          # BOOT/HEALTH axis = u2r.py smoke-test's OWN exit code (it exits 1
          # when SmokeTestReport.status != "pass", u2r.py:2158). We do NOT
          # re-parse a status string to decide pass/fail (the real value is
          # "pass", and re-deriving it is exactly where a "passed" typo would
          # make the gate always-red). We read status ONLY to distinguish a
          # launch/handshake FLAKE from a real boot failure (E2):
          #   * report ABSENT after a non-zero exit  → run_smoke_test hit an
          #     early error return (file-not-found / not-macOS / inject-failed
          #     / Studio-failed-to-open, all status="error") and never wrote
          #     the report → a launch/handshake failure → RETRY.
          #   * report PRESENT, status="error"/"timeout" → Studio never gave a
          #     clean handshake/completion → flake → RETRY.
          #   * report PRESENT, status="fail" → Studio BOOTED and reported
          #     script errors / a crash (a clean-boot-with-errors) → a REAL
          #     gate failure → do NOT retry.
          # Bounded at 1 retry (2 attempts total) so transport flake doesn't
          # red a correct conversion while a real failure still fails fast.
          MAX_ATTEMPTS=2
          attempt=1
          rc=0
          while :; do
            echo "cold-e2e boot/health-check on $RBXLX (attempt $attempt/$MAX_ATTEMPTS)"
            rm -f "$REPORT"
            rc=0
            "$HOME/.unity2rbxlx-venv/bin/python" u2r.py smoke-test "$RBXLX" \
              --output-dir "$PWD/$SMOKE_OUT" || rc=$?

            if [ "$rc" -eq 0 ]; then
              echo "Boot/health PASS (status=pass)."
              break
            fi

            # Classify the non-zero exit.
            if [ ! -f "$REPORT" ]; then
              status="error"  # early return, no report written = launch failure
            else
              status="$("$HOME/.unity2rbxlx-venv/bin/python" -c \
                "import json,sys; print(json.load(open('$REPORT')).get('status','unknown'))")"
            fi
            echo "smoke-test exit=$rc, status=$status"

            case "$status" in
              error|timeout)
                if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                  echo "::warning::Studio launch/handshake failure (status=$status) — retrying (E2)."
                  attempt=$((attempt + 1))
                  continue
                fi
                echo "::error::Studio launch/handshake failed after $MAX_ATTEMPTS attempts (status=$status)."
                exit "$rc"
                ;;
              *)
                # fail / unknown = clean-boot-with-errors → real failure.
                echo "::error::Boot/health gate failed (status=$status) — real conversion/boot error, not retried."
                exit "$rc"
                ;;
            esac
          done

      - name: Player-bind axis (REQUIRE_PLAYER_BIND knob — Phase-5 required gate)
        # FLIPPED to required in Phase 5 (REQUIRE_PLAYER_BIND=1): paradigm C
        # binds the player, so a clean-boot bind-absence is now an ::error:: +
        # exit 1 (the acceptance gate), not a warning. This step runs only after
        # the BOOT/HEALTH gate above passed, so status is "pass" (Studio booted
        # clean); a false wasd_works / mouse_moves_view here is "booted but
        # player not C-bound", never a masked boot error (E3).
        env:
          SMOKE_OUT: smoke_output/SimpleFPS_cold_e2e
        run: |
          REPORT="$PWD/$SMOKE_OUT/smoke_test_report.json"
          if [ ! -f "$REPORT" ]; then
            echo "::error::smoke_test_report.json missing after a passing boot/health gate: $REPORT"
            exit 1
          fi
          WASD="$("$HOME/.unity2rbxlx-venv/bin/python" -c \
            "import json; print(str(json.load(open('$REPORT')).get('wasd_works',False)).lower())")"
          MOUSE="$("$HOME/.unity2rbxlx-venv/bin/python" -c \
            "import json; print(str(json.load(open('$REPORT')).get('mouse_moves_view',False)).lower())")"
          echo "Player-bind axis: wasd_works=$WASD  mouse_moves_view=$MOUSE  (REQUIRE_PLAYER_BIND=$REQUIRE_PLAYER_BIND)"

          fail=0
          for pair in "wasd_works:$WASD" "mouse_moves_view:$MOUSE"; do
            field="${pair%%:*}"; val="${pair##*:}"
            if [ "$val" != "true" ]; then
              if [ "$REQUIRE_PLAYER_BIND" = "1" ]; then
                echo "::error::Player-bind required but $field=$val (Phase-5 require-bind gate)."
                fail=1
              else
                echo "::warning::Player-bind $field=$val — documented-red in Phase 1 (REQUIRE_PLAYER_BIND=0); non-fatal."
              fi
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

      - name: Upload cold-e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cold-e2e-SimpleFPS
          path: |
            converter/output/SimpleFPS_cold_e2e/*.rbxlx
            converter/output/SimpleFPS_cold_e2e/conversion_report.json
            converter/output/SimpleFPS_cold_e2e/scripts/
            converter/smoke_output/SimpleFPS_cold_e2e/smoke_test_report.json
            converter/smoke_output/SimpleFPS_cold_e2e/studio_screenshot.png
          if-no-files-found: warn
          retention-days: 14

  # Phase 5.3: AI-on convert-matrix variant. Runs the SimpleFPS conversion
  # with the AI transpiler enabled and asserts that non-empty
  # TranspiledScript.warnings is the only acceptable failure mode (i.e.
  # no hard transpile failures). Gated on ANTHROPIC_API_KEY availability —
  # when the secret isn't configured the job is skipped cleanly so forks
  # without a key don't see false-failure red builds.
  ai-convert-matrix:
    name: AI-on convert SimpleFPS (nightly)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && github.repository == 'jiazou/unity2rbxlx'
    needs: fast
    timeout-minutes: 60
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init SimpleFPS submodule (skip LFS smudge)
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive test_projects/SimpleFPS
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Skip if no Anthropic API key
        id: keycheck
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "no-key=true" >> "$GITHUB_OUTPUT"
            echo "::warning::ANTHROPIC_API_KEY secret not set; AI-on matrix skipped"
          else
            echo "no-key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert SimpleFPS with AI transpiler
        if: steps.keycheck.outputs.no-key != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python u2r.py convert "../test_projects/SimpleFPS" \
            -o "./output/SimpleFPS_ai" \
            --scene all \
            --no-upload \
            --no-resolve \
            --skip-architecture-step

      - name: Validate AI conversion (placeholder warnings allowed)
        if: steps.keycheck.outputs.no-key != 'true'
        run: |
          # Phase 5.3 acceptance: non-empty TranspiledScript.warnings is the
          # only acceptable failure mode. The validate command surfaces
          # warnings without failing; we then read the conversion_report.json
          # and assert no scripts fell back to the stub generator (which is
          # what transpile_scripts() does when the AI backend errors —
          # there is no "failed" strategy emitted by the pipeline).
          for rbxlx in ./output/SimpleFPS_ai/*.rbxlx; do
            [ -f "$rbxlx" ] || continue
            python u2r.py validate "$rbxlx"
          done
          python -c "
          import json, sys
          from pathlib import Path
          report = json.loads(Path('./output/SimpleFPS_ai/conversion_report.json').read_text())
          scripts = report.get('scripts', [])
          # AI nightly hard-fails on any stub fallback (AI backend errored
          # or produced unusable output) and on any explicit failed entry.
          stubbed = [s for s in scripts if s.get('strategy') == 'stub']
          failed = [s for s in scripts if s.get('strategy') == 'failed']
          if stubbed or failed:
              print(f'::error::{len(stubbed)} scripts fell back to stub, {len(failed)} marked failed:')
              for s in (stubbed + failed)[:10]:
                  print(f'  {s.get(\"strategy\")}: {s.get(\"source_path\", \"?\")}')
              sys.exit(1)
          # Also surface tolerance: how many AI scripts carry warnings
          # (acceptance allows warnings; we just want visibility).
          warn_count = sum(1 for s in scripts if s.get('warnings'))
          ai_count = sum(1 for s in scripts if s.get('strategy') == 'ai')
          print(f'AI transpile OK: {ai_count}/{len(scripts)} via AI, '
                f'{warn_count} have warnings (acceptable)')
          "

      - name: Upload AI conversion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-convert-SimpleFPS
          path: |
            converter/output/SimpleFPS_ai/*.rbxlx
            converter/output/SimpleFPS_ai/conversion_report.json
            converter/output/SimpleFPS_ai/scripts/
          if-no-files-found: warn
          retention-days: 14

  # Phase 5.2b: real-upload smoke. Gated on ROBLOX_API_KEY + UNIVERSE_ID +
  # PLACE_ID secrets so it only runs when credentials are wired up. When
  # active, it runs upload + resolve, then validates --strict-asset-ids
  # which fails on any rbxassetid://0 placeholder URL. The SurfaceAppearance
  # round-trip through ReplicatedStorage.Templates is exercised because the
  # full upload pipeline materializes texture URLs into the templates.
  real-upload-smoke:
    name: real-upload smoke (nightly, gated)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && github.repository == 'jiazou/unity2rbxlx'
    needs: fast
    timeout-minutes: 60
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init SimpleFPS submodule (skip LFS smudge)
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive test_projects/SimpleFPS
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Skip if upload secrets unavailable
        id: keycheck
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_UNIVERSE_ID: ${{ secrets.ROBLOX_UNIVERSE_ID }}
          ROBLOX_PLACE_ID: ${{ secrets.ROBLOX_PLACE_ID }}
          ROBLOX_CREATOR_ID: ${{ secrets.ROBLOX_CREATOR_ID }}
        run: |
          # u2r.py convert needs creator-id for upload_assets — without it
          # upload silently skips and validate --strict-asset-ids will fail
          # every run. Gate on all four to keep the job green-or-skipped.
          if [ -z "$ROBLOX_API_KEY" ] || [ -z "$ROBLOX_UNIVERSE_ID" ] \
             || [ -z "$ROBLOX_PLACE_ID" ] || [ -z "$ROBLOX_CREATOR_ID" ]; then
            echo "no-key=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Roblox upload secrets missing (need ROBLOX_API_KEY, ROBLOX_UNIVERSE_ID, ROBLOX_PLACE_ID, ROBLOX_CREATOR_ID); real-upload smoke skipped"
          else
            echo "no-key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert + upload + resolve SimpleFPS
        if: steps.keycheck.outputs.no-key != 'true'
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
        run: |
          python u2r.py convert "../test_projects/SimpleFPS" \
            -o "./output/SimpleFPS_upload" \
            --scene all \
            --no-ai \
            --creator-id "${{ secrets.ROBLOX_CREATOR_ID }}" \
            --universe-id "${{ secrets.ROBLOX_UNIVERSE_ID }}" \
            --place-id "${{ secrets.ROBLOX_PLACE_ID }}" \
            --skip-architecture-step

      - name: Validate upload run with strict asset IDs (5.2a)
        if: steps.keycheck.outputs.no-key != 'true'
        run: |
          # Phase 5.2a: every asset URL must be real after upload+resolve.
          # --strict-asset-ids exits 1 on any rbxassetid://0 placeholder.
          for rbxlx in ./output/SimpleFPS_upload/*.rbxlx; do
            [ -f "$rbxlx" ] || continue
            python u2r.py validate "$rbxlx" --strict-asset-ids
          done

      - name: Upload real-upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-upload-SimpleFPS
          path: |
            converter/output/SimpleFPS_upload/*.rbxlx
            converter/output/SimpleFPS_upload/conversion_report.json
            converter/output/SimpleFPS_upload/conversion_context.json
          if-no-files-found: warn
          retention-days: 14

  nightly-summary:
    name: nightly summary
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: [slow-unit-tests, convert-matrix, eval-regression, smoke-test, cold-e2e, ai-convert-matrix, real-upload-smoke]
    steps:
      - name: Check nightly job results
        run: |
          echo "slow-unit-tests:    ${{ needs.slow-unit-tests.result }}"
          echo "convert-matrix:     ${{ needs.convert-matrix.result }}"
          echo "eval-regression:    ${{ needs.eval-regression.result }}"
          echo "smoke-test:         ${{ needs.smoke-test.result }}"
          echo "cold-e2e:           ${{ needs.cold-e2e.result }}"
          echo "ai-convert-matrix:  ${{ needs.ai-convert-matrix.result }}"
          echo "real-upload-smoke:  ${{ needs.real-upload-smoke.result }}"
          # smoke-test, ai-convert-matrix, and real-upload-smoke are
          # fork-and-secret-gated — treat "skipped" as acceptable when
          # they don't run on upstream or when secrets aren't configured.
          smoke="${{ needs.smoke-test.result }}"
          ai="${{ needs.ai-convert-matrix.result }}"
          up="${{ needs.real-upload-smoke.result }}"
          if [ "${{ needs.slow-unit-tests.result }}" != "success" ] \
             || [ "${{ needs.convert-matrix.result }}" != "success" ] \
             || [ "${{ needs.eval-regression.result }}" != "success" ] \
             || { [ "$smoke" != "success" ] && [ "$smoke" != "skipped" ]; } \
             || { [ "$ai" != "success" ] && [ "$ai" != "skipped" ]; } \
             || { [ "$up" != "success" ] && [ "$up" != "skipped" ]; }; then
            echo "::error::Nightly build had failures"
            exit 1
          fi
