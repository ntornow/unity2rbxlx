name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  fast:
    name: fast test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy pytest pytest-cov

      - name: Run fast test suite
        run: pytest tests/ -m "not slow" -v

  slow:
    name: slow test suite + eval regression (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy pytest pytest-cov

      - name: Run full test suite
        run: pytest tests/ -v

      - name: Run eval and check for regressions
        run: |
          python3 u2r.py eval -o ./eval_current --baseline ./eval_current.json
          python3 u2r.py eval-diff eval_baseline.json eval_current.json --fail-on-regression
