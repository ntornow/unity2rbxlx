name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  fast:
    name: fast test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy lz4 pytest pytest-cov

      - name: Run fast test suite
        run: pytest tests/ -m "not slow" -v

  slow-unit-tests:
    name: slow unit + integration tests (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast
    timeout-minutes: 30
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # Only SimpleFPS has a .gitmodules mapping; the other 8 gitlinks under
      # test_projects/ are dormant. Tests auto-skip unpopulated projects via
      # converter/tests/_project_paths.is_populated().
      - name: Init SimpleFPS submodule (skip LFS smudge)
        # The upstream repo's LFS quota is exhausted so binary assets cannot
        # be pulled; GIT_LFS_SKIP_SMUDGE=1 leaves LFS pointer files in place
        # and the converter detects + skips them (per converter/CLAUDE.md).
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive test_projects/SimpleFPS
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy lz4 pytest pytest-cov

      - name: Run full test suite (unit + integration, incl. @slow)
        run: pytest tests/ -v --junitxml=pytest-junit.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: converter/pytest-junit.xml
          retention-days: 14

  convert-matrix:
    name: convert ${{ matrix.project }}
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Only SimpleFPS is wired to a submodule URL. Re-expand this list as
        # additional test_projects/* entries gain .gitmodules mappings.
        project:
          - SimpleFPS
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init ${{ matrix.project }} submodule (skip LFS smudge)
        # Upstream Unity repos often hit LFS quota; skip smudging so the
        # pointer files stay in place — the converter detects and skips them.
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive "test_projects/${{ matrix.project }}"
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Convert ${{ matrix.project }}
        id: convert
        run: |
          python u2r.py convert "../test_projects/${{ matrix.project }}" \
            -o "./output/${{ matrix.project }}" \
            --scene all \
            --no-upload \
            --no-ai \
            --no-resolve

      - name: Validate generated rbxlx
        if: steps.convert.outcome == 'success'
        run: |
          # --scene all writes per-scene files (e.g. main.rbxlx, menu.rbxlx),
          # not a unified converted_place.rbxlx. Validate every rbxlx found.
          found=0
          for rbxlx in ./output/${{ matrix.project }}/*.rbxlx; do
            [ -f "$rbxlx" ] || continue
            found=1
            python u2r.py validate "$rbxlx"
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No rbxlx files produced under ./output/${{ matrix.project }}/"
            exit 1
          fi

      - name: Upload conversion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: convert-${{ matrix.project }}
          path: |
            converter/output/${{ matrix.project }}/*.rbxlx
            converter/output/${{ matrix.project }}/conversion_report.json
            converter/output/${{ matrix.project }}/conversion_context.json
            converter/output/${{ matrix.project }}/scripts/
          if-no-files-found: warn
          retention-days: 14

  eval-regression:
    name: eval regression vs baseline (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast
    timeout-minutes: 45
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # u2r.py eval auto-discovers populated projects under test_projects/
      # via _project_paths.is_populated(), so initing only SimpleFPS limits
      # the eval run to that project until more submodules are wired up.
      - name: Init SimpleFPS submodule (skip LFS smudge)
        # The upstream repo's LFS quota is exhausted so binary assets cannot
        # be pulled; GIT_LFS_SKIP_SMUDGE=1 leaves LFS pointer files in place
        # and the converter detects + skips them (per converter/CLAUDE.md).
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: git submodule update --init --recursive test_projects/SimpleFPS
        working-directory: ${{ github.workspace }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval across all test projects
        run: |
          python u2r.py eval \
            --output ./eval_output \
            --baseline ./eval_output/eval_current.json

      - name: Diff against committed baseline (SimpleFPS subset)
        run: |
          # Baseline contains all 9 projects; in CI only SimpleFPS is
          # populated, so subset the baseline before diffing — otherwise
          # the 8 unpopulated projects register as MISSING regressions.
          jq '{commit, generated_at, projects: {SimpleFPS: .projects.SimpleFPS}}' \
            ./eval_baseline.json > ./eval_baseline_simplefps.json
          python u2r.py eval-diff \
            ./eval_baseline_simplefps.json \
            ./eval_output/eval_current.json \
            --fail-on-regression

      - name: Upload eval outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-output
          path: |
            converter/eval_output/eval_current.json
            converter/eval_output/**/conversion_report.json
            converter/eval_output/**/converted_place.rbxlx
          if-no-files-found: warn
          retention-days: 14

  smoke-test:
    name: smoke test SimpleFPS (self-hosted macOS + Studio)
    runs-on: [self-hosted, macOS, studio]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: fast
    timeout-minutes: 25
    env:
      # Path to the populated SimpleFPS Unity project on the self-hosted
      # runner. test_projects/* in this repo are gitlinks with no
      # .gitmodules, so CI cannot populate them; we point at a locally
      # cloned Unity project instead. Override by setting a runner-level
      # env var or repo variable if the path ever changes.
      UNITY_SIMPLEFPS_DIR: /Users/jiazou/workspace/unity-3d-simplefps
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Verify SimpleFPS source exists
        run: |
          if [ ! -d "$UNITY_SIMPLEFPS_DIR/Assets" ]; then
            echo "::error::SimpleFPS Unity project not found at $UNITY_SIMPLEFPS_DIR"
            exit 1
          fi

      - name: Install dependencies into shared venv
        run: |
          VENV="$HOME/.unity2rbxlx-venv"
          if [ ! -x "$VENV/bin/python" ]; then
            python3 -m venv "$VENV"
          fi
          "$VENV/bin/python" -m pip install --upgrade pip
          "$VENV/bin/python" -m pip install -e ".[dev]"

      - name: Convert SimpleFPS
        run: |
          "$HOME/.unity2rbxlx-venv/bin/python" u2r.py convert "$UNITY_SIMPLEFPS_DIR" \
            -o "./output/SimpleFPS" \
            --scene all \
            --no-upload \
            --no-ai \
            --no-resolve

      - name: Run smoke test
        run: |
          # --scene all writes per-scene rbxlx files (main.rbxlx is the
          # gameplay scene — 944 parts / 51 scripts). There is no unified
          # converted_place.rbxlx in multi-scene mode.
          # Absolute paths: Studio launched from a non-interactive shell
          # won't reliably resolve relative rbxlx paths (it silently falls
          # back to Start Page and F5 becomes a no-op).
          RBXLX="$PWD/output/SimpleFPS/main.rbxlx"
          if [ ! -f "$RBXLX" ]; then
            echo "::error::Expected rbxlx not found: $RBXLX"
            ls -la ./output/SimpleFPS/ || true
            exit 1
          fi
          echo "smoke-testing $RBXLX"
          "$HOME/.unity2rbxlx-venv/bin/python" u2r.py smoke-test "$RBXLX" \
            --output-dir "$PWD/smoke_output/SimpleFPS"

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-SimpleFPS
          path: |
            converter/smoke_output/SimpleFPS/smoke_test_report.json
            converter/smoke_output/SimpleFPS/studio_screenshot.png
          if-no-files-found: warn
          retention-days: 14

  nightly-summary:
    name: nightly summary
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: [slow-unit-tests, convert-matrix, eval-regression, smoke-test]
    steps:
      - name: Check nightly job results
        run: |
          echo "slow-unit-tests: ${{ needs.slow-unit-tests.result }}"
          echo "convert-matrix:  ${{ needs.convert-matrix.result }}"
          echo "eval-regression: ${{ needs.eval-regression.result }}"
          echo "smoke-test:      ${{ needs.smoke-test.result }}"
          if [ "${{ needs.slow-unit-tests.result }}" != "success" ] \
             || [ "${{ needs.convert-matrix.result }}" != "success" ] \
             || [ "${{ needs.eval-regression.result }}" != "success" ] \
             || [ "${{ needs.smoke-test.result }}" != "success" ]; then
            echo "::error::Nightly build had failures"
            exit 1
          fi
