name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly slow run at 07:00 UTC so we catch regressions on the big
  # end-to-end projects (Gamekit3D etc.) without paying the cost on every
  # push.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  fast:
    name: fast test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dependencies listed in pyproject.toml + dev extras.
          # Not using `pip install -e .` because the repo doesn't have a
          # conventional package layout — tests rely on `sys.path` shims.
          pip install \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy pytest pytest-cov

      - name: Run fast test suite
        run: pytest tests/ -m "not slow" -v

  slow:
    # Runs on schedule and manual dispatch only — NOT on every push/PR,
    # because the end-to-end fixtures need the full test_projects/*
    # submodules (many GB of FBX/textures) and take ~65s.
    name: slow test suite (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    defaults:
      run:
        working-directory: converter
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyyaml click Pillow trimesh scikit-image requests anthropic \
            numpy pytest pytest-cov

      - name: Run full test suite
        run: pytest tests/ -v
